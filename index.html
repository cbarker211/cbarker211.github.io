<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Industry Emissions Tracker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon_rocket.ico">

    <link rel="canonical" href="https://orbitalemissions.org">
	<meta property="og:url" content="https://orbitalemissions.org">
	
	<meta property="og:type" content="website">
	<meta property="og:title" content="Space Industry Emissions Tracker">
	<meta property="og:description" content="Explore global rocket launch and re-entry emissions from 1957 to 2025. Filter, download, and visualise the data.">
	<meta property="og:image" content="https://orbitalemissions.org/assets/images/og-index.png">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="description" content="Explore global rocket launch and re-entry emissions from 1957 to 2025. Filter, download, and visualise the data.">

</head>
<body>

    <style>

        .landing-page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #111;
            }

        .buttons {
            position: absolute;
            z-index: 2;
            display: flex;
            gap: 40px;
            }

        .btn {
            padding: 20px;
            width: 200px;
            font-size: 2em;
            text-decoration: none;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: all 0.5s ease;
            background-color: #246a99;
			border-color: transparent;
			box-shadow: inset 0 0 0 0 transparent, 0 0 0 0 transparent, inset 0 0 0 0 transparent, 0 0.3rem 0 0 #143d59;
		    }

        .btn:hover {
            background-color: #588db1;
            transform: scale(1.1);
            cursor: pointer;
            font-weight: bold;
            }

        .images-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            }

        .image-panel {
            flex: 1; /* default: half the screen each */
            height: 100%;
            background-size: auto 100%;
            background-position: center;
            background-repeat: no-repeat; 
            transition: flex 0.5s ease;
            filter: blur(4px); /* default blur */
            }

    </style>


    <div class="landing-page">
        <div class="buttons">
            <a href="launches.html" class="btn" id="launch-btn">Launch</a>
            <a href="reentries.html" class="btn" id="reentry-btn">Re-entry</a>
        </div>
    <div class="images-container">
        <div class="image-panel" id="launch-panel"></div>
        <div class="image-panel" id="reentry-panel"></div>
    </div>
  </div>

  <div class="bottom-row">
    <p style="text-align: left; margin: 0;">
        Images: ESA/David Ducross, ESA/SpaceX. 
    </p>
  </div>

  <script src="js/index.js"></script>

</body>
</html>
